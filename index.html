<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#cfe8ff" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Our Week</title>
<style>
  :root{
    --blue:#cfe8ff; --blue-deep:#7fb6e6; --green:#d6f0dd; --green-deep:#8fcf9f;
    --ink:#33414f; --soft:#6b7a89; --line:#e6eef5; --card:#ffffff;
    --girl:#ffd9ec; --girl-deep:#e88bb8; --boy:#cfe4ff; --boy-deep:#5e9be0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,#eaf6ff 0%,#f3fbf4 100%);
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* ---------- Lock ---------- */
  #lock{
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:28px;
    background:linear-gradient(180deg,#eaf6ff 0%,#f3fbf4 100%); z-index:50;
  }
  #lock h1{font-size:30px; margin:0; font-weight:700;}
  #lock p{margin:0; color:var(--soft); text-align:center; font-size:15px; max-width:280px;}
  .pwrap{display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px;}
  input[type=password],input[type=text],input[type=time],input[type=date],select{
    font-size:16px; padding:13px 14px; border:1px solid var(--line);
    border-radius:14px; background:#fff; color:var(--ink); width:100%;
  }
  input:focus,select:focus{outline:2px solid var(--blue-deep); border-color:transparent;}
  button{font-family:inherit; cursor:pointer;}
  .btn{
    font-size:16px; font-weight:600; padding:13px 16px; border:none;
    border-radius:14px; background:var(--blue-deep); color:#fff; width:100%;
  }
  .btn:active{transform:scale(.98);}
  .lockmsg{font-size:14px; min-height:18px; color:var(--girl-deep);}
  /* ---------- App ---------- */
  #app{display:none; max-width:560px; margin:0 auto; padding:14px 14px 110px;}
  header.top{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 12px;}
  header.top h1{font-size:24px; margin:0; font-weight:700;}
  .syncdot{font-size:12px; color:var(--soft);}
  /* segmented view switcher */
  .seg{display:flex; background:#e8f1fa; border-radius:14px; padding:4px; margin-bottom:12px;}
  .seg button{
    flex:1; border:none; background:transparent; color:var(--soft);
    font-size:14px; font-weight:600; padding:9px 0; border-radius:10px;
  }
  .seg button.on{background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(80,110,140,.18);}
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    background:#fff; border:1px solid var(--line); border-radius:16px;
    padding:8px 8px; margin-bottom:14px;
  }
  .nav button.arrow{
    border:none; background:var(--blue); color:var(--ink); font-size:18px;
    width:40px; height:40px; border-radius:12px;
  }
  .nav .label{font-weight:600; font-size:15px; text-align:center; flex:1;}
  .nav .label small{display:block; color:var(--soft); font-weight:500; font-size:12px;}
  .today-btn{font-size:12px; color:var(--blue-deep); background:none; border:none; font-weight:600; padding:4px 8px;}
  /* day cards */
  .day{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:12px 14px; margin-bottom:10px;
  }
  .day.today{border-color:var(--blue-deep); box-shadow:0 0 0 2px var(--blue);}
  .day h3{margin:0 0 8px; font-size:15px; display:flex; justify-content:space-between; align-items:center;}
  .day h3 .dnum{color:var(--soft); font-weight:500;}
  .empty{color:#aab6c2; font-size:13px; font-style:italic; padding:2px 0 4px;}
  .ev{
    display:flex; align-items:center; gap:10px; padding:9px 11px;
    border-radius:13px; margin-bottom:7px; background:#f7fbff;
  }
  .ev.girl{background:#fff0f7;}
  .ev.boy{background:#eef6ff;}
  .ev .who{font-size:20px; flex-shrink:0;}
  .ev .meat{flex:1; min-width:0;}
  .ev .lbl{font-weight:600; font-size:15px; word-break:break-word;}
  .ev .tm{font-size:13px; color:var(--soft);}
  .ev .del{border:none; background:transparent; color:#c2ccd6; font-size:20px; width:30px; height:30px; border-radius:8px; flex-shrink:0;}
  .ev .del:active{background:#ffe3ef; color:var(--girl-deep);}
  /* month grid */
  .mgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:14px;}
  .mhead{text-align:center; font-size:11px; color:var(--soft); font-weight:600; padding-bottom:2px;}
  .cell{
    aspect-ratio:1/1; background:#fff; border:1px solid var(--line); border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding-top:6px; font-size:13px; position:relative; color:var(--ink);
  }
  .cell.dim{color:#c2ccd6; background:#f7fafd;}
  .cell.today{border-color:var(--blue-deep); box-shadow:0 0 0 2px var(--blue);}
  .cell.sel{background:var(--blue); border-color:var(--blue-deep);}
  .cell .dots{display:flex; gap:3px; margin-top:4px; flex-wrap:wrap; justify-content:center;}
  .cell .dots i{width:6px; height:6px; border-radius:50%; display:block;}
  .cell .dots i.girl{background:var(--girl-deep);}
  .cell .dots i.boy{background:var(--boy-deep);}
  .selday-title{font-size:14px; font-weight:600; margin:2px 2px 8px; color:var(--soft);}
  /* add button + sheet */
  #addBtn{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(20px + env(safe-area-inset-bottom));
    background:var(--blue-deep); color:#fff; border:none;
    font-size:16px; font-weight:700; padding:15px 26px; border-radius:30px;
    box-shadow:0 8px 24px rgba(94,155,224,.45); z-index:30;
  }
  #sheet{position:fixed; inset:0; background:rgba(40,55,70,.32); display:none; align-items:flex-end; justify-content:center; z-index:40;}
  #sheet .card{
    background:#fff; width:100%; max-width:560px;
    border-radius:22px 22px 0 0; padding:20px 18px calc(22px + env(safe-area-inset-bottom));
    animation:rise .18s ease;
  }
  @keyframes rise{from{transform:translateY(30px); opacity:.6;} to{transform:translateY(0); opacity:1;}}
  #sheet h2{margin:0 0 14px; font-size:19px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:13px; color:var(--soft); margin-bottom:5px;}
  .whopick{display:flex; gap:10px;}
  .whopick button{flex:1; font-size:15px; font-weight:600; padding:12px; border-radius:14px; border:2px solid var(--line); background:#fff; color:var(--ink);}
  .whopick button.sel.girl{border-color:var(--girl-deep); background:var(--girl);}
  .whopick button.sel.boy{border-color:var(--boy-deep); background:var(--boy);}
  .row2{display:flex; gap:10px;} .row2 > div{flex:1;}
  .sheetbtns{display:flex; gap:10px; margin-top:6px;}
  .sheetbtns .ghost{background:#eef3f8; color:var(--soft);}
  .hint{font-size:12px; color:#aab6c2; text-align:center; margin-top:14px;}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div style="font-size:46px">👧🗓️👦</div>
  <h1>Our Week</h1>
  <p>Type the password you two share to open your schedule.</p>
  <div class="pwrap">
    <input id="pw" type="password" placeholder="Shared password" autocomplete="current-password" />
    <button class="btn" id="enterBtn">Open</button>
    <div class="lockmsg" id="lockmsg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="top">
    <h1>Our Week</h1>
    <span class="syncdot" id="syncdot">offline</span>
  </header>

  <div class="seg">
    <button data-view="day">Day</button>
    <button data-view="week" class="on">Week</button>
    <button data-view="month">Month</button>
  </div>

  <div class="nav">
    <button class="arrow" id="prev">‹</button>
    <div class="label" id="navLabel">—<small></small></div>
    <button class="arrow" id="next">›</button>
  </div>
  <div style="text-align:center; margin-top:-6px; margin-bottom:10px;">
    <button class="today-btn" id="todayBtn">• jump to today</button>
  </div>

  <div id="content"></div>
</div>

<button id="addBtn" style="display:none">＋ Add</button>

<!-- ADD SHEET -->
<div id="sheet">
  <div class="card">
    <h2>Add to the calendar</h2>
    <div class="field">
      <label>Who?</label>
      <div class="whopick">
        <button id="pickGirl" class="girl" data-who="girl">👧 Her</button>
        <button id="pickBoy" class="boy" data-who="boy">👦 Him</button>
      </div>
    </div>
    <div class="field">
      <label>What?</label>
      <input id="fLabel" type="text" placeholder="e.g. Work, Gym, Date night" />
    </div>
    <div class="row2">
      <div class="field"><label>Day</label><input id="fDate" type="date" /></div>
      <div class="field"><label>Time (optional)</label><input id="fTime" type="time" /></div>
    </div>
    <div class="sheetbtns">
      <button class="btn ghost" id="cancelAdd">Cancel</button>
      <button class="btn" id="saveAdd">Add it</button>
    </div>
    <div class="hint">Tip: leave time blank for all-day things.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ====================================================================
   CONFIG — filled in during cloud setup. Until then it runs local-only.
==================================================================== */
const SUPABASE_URL = "https://kfxyakgzfppwivrblwmv.supabase.co";
const SUPABASE_KEY = "sb_publishable_MECWQl2dCrxyxEuRJTpH5Q_3Qq-O_Zu";
const SHARED_EMAIL = "ourweek.shared@example.com";
const CLOUD_ON = SUPABASE_URL.indexOf("http") === 0;

/* ---------------- State ---------------- */
let DATA = { events: [], updated: 0 };   // {id,date:'YYYY-MM-DD',who,label,time}
let view = "week";
let cursor = stripTime(new Date());      // anchor date for current view
let selDay = ymd(new Date());            // selected day in month view
let pickedWho = "girl";
let sb = null, signedIn = false;

const LS_KEY = "ourweek_data_v1";
const DAYNAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ---------------- Date helpers ---------------- */
function stripTime(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fromYmd(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function startOfWeek(d){ const x=stripTime(d); x.setDate(x.getDate()-x.getDay()); return x; }
function prettyTime(t){ if(!t) return ""; let [h,m]=t.split(":").map(Number); const ap=h>=12?"PM":"AM"; h=h%12||12; return h+":"+String(m).padStart(2,"0")+" "+ap; }
function md(d){ return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }

/* ---------------- Storage ---------------- */
function loadLocal(){ try{ const r=JSON.parse(localStorage.getItem(LS_KEY)); if(r&&r.events) DATA=r; }catch(e){} }
function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }

/* ---------------- Helpers ---------------- */
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function eventsOn(key){ return DATA.events.filter(e=>e.date===key).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99")); }
function dayCardHTML(d){
  const key=ymd(d), today=ymd(new Date());
  const evs=eventsOn(key);
  let html='<div class="day'+(key===today?" today":"")+'">';
  html+='<h3>'+DAYNAMES[d.getDay()]+'<span class="dnum">'+md(d)+'</span></h3>';
  if(!evs.length) html+='<div class="empty">nothing yet</div>';
  evs.forEach(e=>{
    html+='<div class="ev '+e.who+'"><span class="who">'+(e.who==="girl"?"👧":"👦")+'</span>'
      +'<div class="meat"><div class="lbl">'+escapeHtml(e.label)+'</div>'
      +(e.time?'<div class="tm">'+prettyTime(e.time)+'</div>':'')+'</div>'
      +'<button class="del" data-id="'+e.id+'">×</button></div>';
  });
  return html+'</div>';
}

/* ---------------- Render ---------------- */
function render(){
  document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("on", b.dataset.view===view));
  const c=document.getElementById("content"); const lab=document.getElementById("navLabel");
  if(view==="day"){
    lab.innerHTML = DAYNAMES[cursor.getDay()]+"<small>"+cursor.toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"})+"</small>";
    c.innerHTML = dayCardHTML(cursor);
  }else if(view==="week"){
    const ws=startOfWeek(cursor), we=addDays(ws,6);
    lab.innerHTML = "Week<small>"+md(ws)+" – "+md(we)+"</small>";
    let h=""; for(let i=0;i<7;i++) h+=dayCardHTML(addDays(ws,i)); c.innerHTML=h;
  }else{
    lab.innerHTML = MON[cursor.getMonth()]+"<small>"+cursor.getFullYear()+"</small>";
    c.innerHTML = monthHTML(cursor);
  }
  bindDeletes(); if(view==="month") bindCells();
}
function monthHTML(d){
  const today=ymd(new Date());
  const first=new Date(d.getFullYear(), d.getMonth(), 1);
  const gridStart=startOfWeek(first);
  let h='<div class="mgrid">';
  DOW.forEach(n=>h+='<div class="mhead">'+n+'</div>');
  for(let i=0;i<42;i++){
    const cd=addDays(gridStart,i); const key=ymd(cd);
    const inMonth=cd.getMonth()===d.getMonth();
    const evs=eventsOn(key);
    const hasG=evs.some(e=>e.who==="girl"), hasB=evs.some(e=>e.who==="boy");
    let cls="cell"+(inMonth?"":" dim")+(key===today?" today":"")+(key===selDay?" sel":"");
    h+='<div class="'+cls+'" data-key="'+key+'">'+cd.getDate()
      +'<div class="dots">'+(hasG?'<i class="girl"></i>':'')+(hasB?'<i class="boy"></i>':'')+'</div></div>';
  }
  h+='</div>';
  const sd=fromYmd(selDay);
  h+='<div class="selday-title">'+DAYNAMES[sd.getDay()]+", "+md(sd)+'</div>';
  h+=dayCardHTML(sd);
  return h;
}
function bindDeletes(){ document.querySelectorAll(".del").forEach(b=>b.onclick=()=>removeEvent(b.dataset.id)); }
function bindCells(){ document.querySelectorAll(".cell").forEach(c=>c.onclick=()=>{ selDay=c.dataset.key; render(); }); }

/* ---------------- Mutations ---------------- */
function touch(){ DATA.updated=Date.now(); saveLocal(); pushCloud(); scheduleSnapshot(); render(); }
function addEvent(ev){ DATA.events.push(ev); touch(); }
function removeEvent(id){ DATA.events=DATA.events.filter(e=>e.id!==id); touch(); }

/* ---------------- Nav ---------------- */
function go(dir){
  if(view==="day") cursor=addDays(cursor,dir);
  else if(view==="week") cursor=addDays(cursor,dir*7);
  else { cursor=addMonths(cursor,dir); selDay=ymd(new Date(cursor.getFullYear(),cursor.getMonth(),1)); }
  render();
}

/* ---------------- Add sheet ---------------- */
function openSheet(){
  let def = view==="month" ? selDay : (view==="day" ? ymd(cursor) : ymd(new Date()));
  document.getElementById("fDate").value=def;
  document.getElementById("fLabel").value="";
  document.getElementById("fTime").value="";
  setWho("girl");
  document.getElementById("sheet").style.display="flex";
}
function closeSheet(){ document.getElementById("sheet").style.display="none"; }
function setWho(w){ pickedWho=w;
  document.getElementById("pickGirl").classList.toggle("sel", w==="girl");
  document.getElementById("pickBoy").classList.toggle("sel", w==="boy"); }

/* ---------------- Cloud ---------------- */
async function initCloud(password){
  if(!CLOUD_ON){ signedIn=false; setSync("local only"); return true; }
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  let { error }=await sb.auth.signInWithPassword({email:SHARED_EMAIL,password});
  if(error){
    const up=await sb.auth.signUp({email:SHARED_EMAIL,password});
    if(up.error) return false;
    const again=await sb.auth.signInWithPassword({email:SHARED_EMAIL,password});
    if(again.error) return false;
  }
  signedIn=true; await pullCloud(); setSync("synced ✓"); return true;
}
async function pullCloud(){
  if(!signedIn) return;
  const { data, error }=await sb.from("schedule").select("data,updated").maybeSingle();
  if(error){ setSync("sync error"); return; }
  if(data && data.data){
    const rUpd=new Date(data.updated).getTime();
    if(rUpd>=(DATA.updated||0)){ DATA=data.data; saveLocal(); render(); } else pushCloud();
  } else pushCloud();
}
let pushTimer=null;
function pushCloud(){
  if(!signedIn) return; setSync("saving…"); clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    const { error }=await sb.from("schedule").upsert(
      { data:DATA, updated:new Date(DATA.updated).toISOString() }, { onConflict:"user_id" });
    setSync(error?"sync error":"synced ✓");
  },400);
}
function setSync(t){ document.getElementById("syncdot").textContent=t; }

/* ---------------- Snapshots (backup on every change, keep last 30) ---------------- */
let snapTimer=null;
function scheduleSnapshot(){
  if(!signedIn) return;
  clearTimeout(snapTimer);
  snapTimer=setTimeout(saveSnapshot, 4000);   // a few seconds after the last edit
}
async function saveSnapshot(){
  if(!signedIn) return;
  try{
    await sb.from("schedule_snapshots").insert({ data:DATA });
    const { data:rows } = await sb.from("schedule_snapshots")
      .select("id,created").order("created",{ascending:false});
    if(rows && rows.length>30){
      const old = rows.slice(30).map(r=>r.id);
      await sb.from("schedule_snapshots").delete().in("id", old);
    }
  }catch(e){ /* snapshots are best-effort; never block the app */ }
}

/* ---------------- Boot ---------------- */
loadLocal();
document.getElementById("enterBtn").onclick=unlock;
document.getElementById("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") unlock(); });
async function unlock(){
  const pw=document.getElementById("pw").value.trim();
  if(!pw){ document.getElementById("lockmsg").textContent="Type the password."; return; }
  document.getElementById("lockmsg").textContent="Opening…";
  const ok=await initCloud(pw);
  if(!ok){ document.getElementById("lockmsg").textContent="That password doesn't match."; return; }
  document.getElementById("lock").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("addBtn").style.display="block";
  render();
}
document.querySelectorAll(".seg button").forEach(b=>b.onclick=()=>{ view=b.dataset.view; render(); });
document.getElementById("prev").onclick=()=>go(-1);
document.getElementById("next").onclick=()=>go(1);
document.getElementById("todayBtn").onclick=()=>{ cursor=stripTime(new Date()); selDay=ymd(new Date()); render(); };
document.getElementById("addBtn").onclick=openSheet;
document.getElementById("cancelAdd").onclick=closeSheet;
document.getElementById("pickGirl").onclick=()=>setWho("girl");
document.getElementById("pickBoy").onclick=()=>setWho("boy");
document.getElementById("sheet").addEventListener("click",e=>{ if(e.target.id==="sheet") closeSheet(); });
document.getElementById("saveAdd").onclick=()=>{
  const label=document.getElementById("fLabel").value.trim();
  if(!label){ document.getElementById("fLabel").focus(); return; }
  const date=document.getElementById("fDate").value; if(!date) return;
  addEvent({ id:Date.now()+"-"+Math.random().toString(36).slice(2,7),
    date, who:pickedWho, label, time:document.getElementById("fTime").value||"" });
  closeSheet();
};
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
