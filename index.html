<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a1020" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>schedulemaxxing</title>
<style>
  :root{
    --bg0:#080d1a; --bg1:#0d1530; --bg2:#0a1226;
    --ink:#eef3ff; --soft:#8a99bd; --faint:#5b6a8f;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.05);
    --card:rgba(255,255,255,.045);
    --accent:#3f7dff; --accent2:#73b4ff; --accentglow:rgba(63,125,255,.45);
    --girl:#ff8fc4; --girl-bg:rgba(255,143,196,.13);
    --boy:#5fa8ff; --boy-bg:rgba(95,168,255,.13);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 600px at 15% -8%, rgba(63,125,255,.28), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(115,180,255,.16), transparent 55%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 45%, var(--bg2) 100%);
    background-attachment:fixed;
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* faint grid texture for depth */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:44px 44px; mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 75%);
  }
  .wordmark{font-family:"Space Grotesk",Inter,sans-serif; letter-spacing:-.02em;}
  input,button,select{font-family:inherit;}
  /* ---------- Lock ---------- */
  #lock{
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; padding:28px;
    background:
      radial-gradient(800px 500px at 50% 12%, rgba(63,125,255,.3), transparent 60%),
      linear-gradient(180deg, var(--bg1), var(--bg0));
  }
  .badge{
    width:74px; height:74px; border-radius:22px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg,#2f6bff,#1a2b55); box-shadow:0 12px 40px var(--accentglow), inset 0 1px 0 rgba(255,255,255,.25);
    position:relative;
  }
  .badge .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:4px;}
  .badge .grid i{width:9px; height:9px; border-radius:3px; background:rgba(255,255,255,.85);}
  .badge .grid i.on{background:var(--accent2); box-shadow:0 0 8px var(--accent2);}
  #lock h1{font-size:30px; margin:2px 0 0; font-weight:700;}
  #lock p{margin:0; color:var(--soft); text-align:center; font-size:14.5px; max-width:280px; line-height:1.5;}
  .pwrap{display:flex; flex-direction:column; gap:11px; width:100%; max-width:300px; margin-top:4px;}
  input[type=password],input[type=text],input[type=time],input[type=date]{
    font-size:16px; padding:14px 15px; border:1px solid var(--line); border-radius:14px;
    background:rgba(255,255,255,.04); color:var(--ink); width:100%; backdrop-filter:blur(6px);
  }
  input::placeholder{color:#6c7aa0;}
  input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(63,125,255,.22);}
  .btn{
    font-size:16px; font-weight:600; padding:14px 16px; border:none; border-radius:14px;
    background:linear-gradient(180deg,#4985ff,#2f6bff); color:#fff; width:100%;
    box-shadow:0 8px 24px var(--accentglow);
  }
  .btn:active{transform:translateY(1px) scale(.995);}
  .lockmsg{font-size:13.5px; min-height:18px; color:var(--girl);}
  /* ---------- App ---------- */
  #app{display:none; position:relative; z-index:1; max-width:600px; margin:0 auto; padding:16px 14px 120px;}
  header.top{display:flex; align-items:center; justify-content:space-between; padding:4px 4px 14px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .dot{width:30px; height:30px; border-radius:9px; background:linear-gradient(150deg,#2f6bff,#16244a);
    box-shadow:0 4px 14px var(--accentglow), inset 0 1px 0 rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center;}
  .brand .dot::after{content:""; width:11px; height:11px; border-radius:3px; background:#fff;
    box-shadow:5px 0 0 -3px var(--accent2), 0 5px 0 -3px var(--accent2);}
  header.top h1{font-size:21px; margin:0; font-weight:700; background:linear-gradient(90deg,#fff,#9cc4ff);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .syncdot{font-size:11px; color:var(--soft); display:flex; align-items:center; gap:6px; letter-spacing:.02em;}
  .syncdot::before{content:""; width:7px; height:7px; border-radius:50%; background:#3ecf8e; box-shadow:0 0 8px #3ecf8e;}
  /* segmented */
  .seg{display:flex; gap:4px; background:rgba(255,255,255,.04); border:1px solid var(--line2);
    border-radius:15px; padding:5px; margin-bottom:14px; backdrop-filter:blur(10px);}
  .seg button{flex:1; border:none; background:transparent; color:var(--soft); font-size:14px; font-weight:600;
    padding:10px 0; border-radius:11px; transition:.18s;}
  .seg button.on{color:#fff; background:linear-gradient(180deg,rgba(63,125,255,.9),rgba(47,107,255,.75));
    box-shadow:0 4px 14px var(--accentglow);}
  .nav{display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:8px; margin-bottom:8px; backdrop-filter:blur(10px);}
  .nav button.arrow{border:none; background:rgba(255,255,255,.06); color:var(--ink); font-size:18px;
    width:40px; height:40px; border-radius:12px; border:1px solid var(--line2);}
  .nav button.arrow:active{background:rgba(63,125,255,.25);}
  .nav .label{font-weight:600; font-size:15px; text-align:center; flex:1;}
  .nav .label small{display:block; color:var(--soft); font-weight:500; font-size:12px; margin-top:1px;}
  .today-row{text-align:center; margin:0 0 12px;}
  .today-btn{font-size:12px; color:var(--accent2); background:none; border:none; font-weight:600; padding:6px 10px; letter-spacing:.02em;}
  /* day card */
  .day{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:13px 15px; margin-bottom:11px;
    backdrop-filter:blur(12px); box-shadow:0 8px 30px rgba(0,0,0,.25);}
  .day.today{border-color:rgba(63,125,255,.55); box-shadow:0 0 0 1px rgba(63,125,255,.4), 0 10px 34px var(--accentglow);
    animation:glow 3.2s ease-in-out infinite;}
  @keyframes glow{0%,100%{box-shadow:0 0 0 1px rgba(63,125,255,.35), 0 10px 30px rgba(63,125,255,.25);}
    50%{box-shadow:0 0 0 1px rgba(63,125,255,.6), 0 12px 40px rgba(63,125,255,.42);}}
  .day h3{margin:0 0 9px; font-size:15px; font-weight:600; display:flex; justify-content:space-between; align-items:center;}
  .day h3 .dnum{color:var(--soft); font-weight:500; font-size:13px;}
  .empty{color:#586585; font-size:13px; padding:2px 0 3px;}
  .ev{display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:13px; margin-bottom:7px;
    background:rgba(255,255,255,.04); border:1px solid var(--line2); position:relative; overflow:hidden;}
  .ev::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px;}
  .ev.girl::before{background:var(--girl); box-shadow:0 0 10px var(--girl);}
  .ev.boy::before{background:var(--boy); box-shadow:0 0 10px var(--boy);}
  .ev.girl{background:var(--girl-bg);} .ev.boy{background:var(--boy-bg);}
  .ev .who{font-size:19px; flex-shrink:0;}
  .ev .meat{flex:1; min-width:0;}
  .ev .lbl{font-weight:600; font-size:15px; word-break:break-word;}
  .ev .tm{font-size:12.5px; color:var(--soft); margin-top:1px;}
  .ev .del{border:none; background:transparent; color:#5b6a8f; font-size:20px; width:30px; height:30px; border-radius:9px; flex-shrink:0;}
  .ev .del:active{background:rgba(255,143,196,.2); color:var(--girl);}
  /* month grid */
  .mgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:14px;}
  .mhead{text-align:center; font-size:10.5px; color:var(--soft); font-weight:600; padding-bottom:3px; letter-spacing:.04em;}
  .cell{aspect-ratio:1/1; background:var(--card); border:1px solid var(--line2); border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:6px;
    font-size:13px; font-weight:500; color:var(--ink); backdrop-filter:blur(8px);}
  .cell.dim{color:#465270; background:rgba(255,255,255,.015);}
  .cell.today{border-color:rgba(63,125,255,.65); box-shadow:0 0 0 1px rgba(63,125,255,.5), 0 0 16px var(--accentglow); color:#fff;}
  .cell.sel{background:linear-gradient(180deg,rgba(63,125,255,.4),rgba(63,125,255,.18)); border-color:var(--accent);}
  .cell .dots{display:flex; gap:3px; margin-top:4px;}
  .cell .dots i{width:6px; height:6px; border-radius:50%; display:block;}
  .cell .dots i.girl{background:var(--girl); box-shadow:0 0 6px var(--girl);}
  .cell .dots i.boy{background:var(--boy); box-shadow:0 0 6px var(--boy);}
  .selday-title{font-size:13px; font-weight:600; margin:4px 2px 9px; color:var(--soft); letter-spacing:.02em;}
  /* add + sheet */
  #addBtn{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(22px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,#4985ff,#2f6bff); color:#fff; border:none; font-size:15px; font-weight:700;
    padding:15px 28px; border-radius:30px; box-shadow:0 10px 30px var(--accentglow), inset 0 1px 0 rgba(255,255,255,.25);
    z-index:30; letter-spacing:.01em;}
  #addBtn:active{transform:translateX(-50%) translateY(1px);}
  #sheet{position:fixed; inset:0; background:rgba(4,8,18,.6); backdrop-filter:blur(4px);
    display:none; align-items:flex-end; justify-content:center; z-index:40;}
  #sheet .card{background:linear-gradient(180deg,#121b35,#0c1426); width:100%; max-width:600px;
    border:1px solid var(--line); border-bottom:none; border-radius:24px 24px 0 0;
    padding:20px 18px calc(22px + env(safe-area-inset-bottom)); animation:rise .2s ease;}
  @keyframes rise{from{transform:translateY(32px); opacity:.5;} to{transform:translateY(0); opacity:1;}}
  #sheet h2{margin:0 0 15px; font-size:19px; font-weight:700;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12.5px; color:var(--soft); margin-bottom:6px; letter-spacing:.02em;}
  .whopick{display:flex; gap:10px;}
  .whopick button{flex:1; font-size:15px; font-weight:600; padding:13px; border-radius:14px;
    border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--ink);}
  .whopick button.sel.girl{border-color:var(--girl); background:var(--girl-bg); box-shadow:0 0 0 1px var(--girl) inset;}
  .whopick button.sel.boy{border-color:var(--boy); background:var(--boy-bg); box-shadow:0 0 0 1px var(--boy) inset;}
  .row2{display:flex; gap:10px;} .row2 > div{flex:1;}
  .sheetbtns{display:flex; gap:10px; margin-top:8px;}
  .sheetbtns .ghost{background:rgba(255,255,255,.06); color:var(--soft); box-shadow:none;}
  .hint{font-size:11.5px; color:#56638a; text-align:center; margin-top:14px;}
  canvas#fx{position:fixed; inset:0; pointer-events:none; z-index:35;}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="badge"><div class="grid"><i></i><i class="on"></i><i></i><i></i><i></i><i class="on"></i><i class="on"></i><i></i><i></i></div></div>
  <h1 class="wordmark">schedulemaxxing</h1>
  <p>Enter the password you two share to open your schedule.</p>
  <div class="pwrap">
    <input id="pw" type="password" placeholder="Shared password" autocomplete="current-password" />
    <button class="btn" id="enterBtn">Open</button>
    <div class="lockmsg" id="lockmsg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="top">
    <div class="brand"><span class="dot"></span><h1 class="wordmark">schedulemaxxing</h1></div>
    <span class="syncdot" id="syncdot">offline</span>
  </header>

  <div class="seg">
    <button data-view="day">Day</button>
    <button data-view="week" class="on">Week</button>
    <button data-view="month">Month</button>
  </div>

  <div class="nav">
    <button class="arrow" id="prev">‹</button>
    <div class="label" id="navLabel">—<small></small></div>
    <button class="arrow" id="next">›</button>
  </div>
  <div class="today-row"><button class="today-btn" id="todayBtn">◍ jump to today</button></div>

  <div id="content"></div>
</div>

<button id="addBtn" style="display:none">＋ Add plan</button>
<canvas id="fx"></canvas>

<!-- ADD SHEET -->
<div id="sheet">
  <div class="card">
    <h2>Add a plan</h2>
    <div class="field">
      <label>WHO</label>
      <div class="whopick">
        <button id="pickGirl" class="girl" data-who="girl">👧 Her</button>
        <button id="pickBoy" class="boy" data-who="boy">👦 Him</button>
      </div>
    </div>
    <div class="field">
      <label>WHAT</label>
      <input id="fLabel" type="text" placeholder="e.g. Work, Gym, Date night" />
    </div>
    <div class="row2">
      <div class="field"><label>DAY</label><input id="fDate" type="date" /></div>
      <div class="field"><label>TIME (OPTIONAL)</label><input id="fTime" type="time" /></div>
    </div>
    <div class="sheetbtns">
      <button class="btn ghost" id="cancelAdd">Cancel</button>
      <button class="btn" id="saveAdd">Add it</button>
    </div>
    <div class="hint">Leave time blank for all-day things.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ====================================================================
   CONFIG
==================================================================== */
const SUPABASE_URL = "https://kfxyakgzfppwivrblwmv.supabase.co";
const SUPABASE_KEY = "sb_publishable_MECWQl2dCrxyxEuRJTpH5Q_3Qq-O_Zu";
const SHARED_EMAIL = "ourweek.shared@example.com";
const CLOUD_ON = SUPABASE_URL.indexOf("http") === 0;

/* ---------------- State ---------------- */
let DATA = { events: [], updated: 0 };
let view = "week";
let cursor = stripTime(new Date());
let selDay = ymd(new Date());
let pickedWho = "girl";
let sb = null, signedIn = false;

const LS_KEY = "ourweek_data_v1";
const DAYNAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ---------------- Date helpers ---------------- */
function stripTime(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fromYmd(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function startOfWeek(d){ const x=stripTime(d); x.setDate(x.getDate()-x.getDay()); return x; }
function prettyTime(t){ if(!t) return ""; let [h,m]=t.split(":").map(Number); const ap=h>=12?"PM":"AM"; h=h%12||12; return h+":"+String(m).padStart(2,"0")+" "+ap; }
function md(d){ return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }

/* ---------------- Storage ---------------- */
function loadLocal(){ try{ const r=JSON.parse(localStorage.getItem(LS_KEY)); if(r&&r.events) DATA=r; }catch(e){} }
function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }

/* ---------------- Helpers ---------------- */
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function eventsOn(key){ return DATA.events.filter(e=>e.date===key).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99")); }
function dayCardHTML(d){
  const key=ymd(d), today=ymd(new Date());
  const evs=eventsOn(key);
  let html='<div class="day'+(key===today?" today":"")+'">';
  html+='<h3>'+DAYNAMES[d.getDay()]+'<span class="dnum">'+md(d)+'</span></h3>';
  if(!evs.length) html+='<div class="empty">free as a bird 🐦</div>';
  evs.forEach(e=>{
    html+='<div class="ev '+e.who+'"><span class="who">'+(e.who==="girl"?"👧":"👦")+'</span>'
      +'<div class="meat"><div class="lbl">'+escapeHtml(e.label)+'</div>'
      +(e.time?'<div class="tm">'+prettyTime(e.time)+'</div>':'')+'</div>'
      +'<button class="del" data-id="'+e.id+'">×</button></div>';
  });
  return html+'</div>';
}

/* ---------------- Render ---------------- */
function render(){
  document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("on", b.dataset.view===view));
  const c=document.getElementById("content"); const lab=document.getElementById("navLabel");
  if(view==="day"){
    lab.innerHTML = DAYNAMES[cursor.getDay()]+"<small>"+cursor.toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"})+"</small>";
    c.innerHTML = dayCardHTML(cursor);
  }else if(view==="week"){
    const ws=startOfWeek(cursor), we=addDays(ws,6);
    lab.innerHTML = "Week<small>"+md(ws)+" – "+md(we)+"</small>";
    let h=""; for(let i=0;i<7;i++) h+=dayCardHTML(addDays(ws,i)); c.innerHTML=h;
  }else{
    lab.innerHTML = MON[cursor.getMonth()]+"<small>"+cursor.getFullYear()+"</small>";
    c.innerHTML = monthHTML(cursor);
  }
  bindDeletes(); if(view==="month") bindCells();
}
function monthHTML(d){
  const today=ymd(new Date());
  const first=new Date(d.getFullYear(), d.getMonth(), 1);
  const gridStart=startOfWeek(first);
  let h='<div class="mgrid">';
  DOW.forEach(n=>h+='<div class="mhead">'+n+'</div>');
  for(let i=0;i<42;i++){
    const cd=addDays(gridStart,i); const key=ymd(cd);
    const inMonth=cd.getMonth()===d.getMonth();
    const evs=eventsOn(key);
    const hasG=evs.some(e=>e.who==="girl"), hasB=evs.some(e=>e.who==="boy");
    let cls="cell"+(inMonth?"":" dim")+(key===today?" today":"")+(key===selDay?" sel":"");
    h+='<div class="'+cls+'" data-key="'+key+'">'+cd.getDate()
      +'<div class="dots">'+(hasG?'<i class="girl"></i>':'')+(hasB?'<i class="boy"></i>':'')+'</div></div>';
  }
  h+='</div>';
  const sd=fromYmd(selDay);
  h+='<div class="selday-title">'+DAYNAMES[sd.getDay()]+", "+md(sd)+'</div>';
  h+=dayCardHTML(sd);
  return h;
}
function bindDeletes(){ document.querySelectorAll(".del").forEach(b=>b.onclick=()=>removeEvent(b.dataset.id)); }
function bindCells(){ document.querySelectorAll(".cell").forEach(c=>c.onclick=()=>{ selDay=c.dataset.key; render(); }); }

/* ---------------- Mutations ---------------- */
function touch(){ DATA.updated=Date.now(); saveLocal(); pushCloud(); scheduleSnapshot(); render(); }
function addEvent(ev){ DATA.events.push(ev); touch(); }
function removeEvent(id){ DATA.events=DATA.events.filter(e=>e.id!==id); touch(); }

/* ---------------- Nav ---------------- */
function go(dir){
  if(view==="day") cursor=addDays(cursor,dir);
  else if(view==="week") cursor=addDays(cursor,dir*7);
  else { cursor=addMonths(cursor,dir); selDay=ymd(new Date(cursor.getFullYear(),cursor.getMonth(),1)); }
  render();
}

/* ---------------- Add sheet ---------------- */
function openSheet(){
  let def = view==="month" ? selDay : (view==="day" ? ymd(cursor) : ymd(new Date()));
  document.getElementById("fDate").value=def;
  document.getElementById("fLabel").value="";
  document.getElementById("fTime").value="";
  setWho("girl");
  document.getElementById("sheet").style.display="flex";
}
function closeSheet(){ document.getElementById("sheet").style.display="none"; }
function setWho(w){ pickedWho=w;
  document.getElementById("pickGirl").classList.toggle("sel", w==="girl");
  document.getElementById("pickBoy").classList.toggle("sel", w==="boy"); }

/* ---------------- Cloud ---------------- */
async function initCloud(password){
  if(!CLOUD_ON){ signedIn=false; setSync("local only"); return true; }
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  let { error }=await sb.auth.signInWithPassword({email:SHARED_EMAIL,password});
  if(error){
    const up=await sb.auth.signUp({email:SHARED_EMAIL,password});
    if(up.error) return false;
    const again=await sb.auth.signInWithPassword({email:SHARED_EMAIL,password});
    if(again.error) return false;
  }
  signedIn=true; await pullCloud(); setSync("synced"); return true;
}
async function pullCloud(){
  if(!signedIn) return;
  const { data, error }=await sb.from("schedule").select("data,updated").maybeSingle();
  if(error){ setSync("sync error"); return; }
  if(data && data.data){
    const rUpd=new Date(data.updated).getTime();
    if(rUpd>=(DATA.updated||0)){ DATA=data.data; saveLocal(); render(); } else pushCloud();
  } else pushCloud();
}
let pushTimer=null;
function pushCloud(){
  if(!signedIn) return; setSync("saving…"); clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    const { error }=await sb.from("schedule").upsert(
      { data:DATA, updated:new Date(DATA.updated).toISOString() }, { onConflict:"user_id" });
    setSync(error?"sync error":"synced");
  },400);
}
function setSync(t){ document.getElementById("syncdot").textContent=t; }

/* ---------------- Snapshots (backup on every change, keep last 30) ---------------- */
let snapTimer=null;
function scheduleSnapshot(){
  if(!signedIn) return;
  clearTimeout(snapTimer);
  snapTimer=setTimeout(saveSnapshot, 4000);
}
async function saveSnapshot(){
  if(!signedIn) return;
  try{
    await sb.from("schedule_snapshots").insert({ data:DATA });
    const { data:rows } = await sb.from("schedule_snapshots")
      .select("id,created").order("created",{ascending:false});
    if(rows && rows.length>30){
      const old = rows.slice(30).map(r=>r.id);
      await sb.from("schedule_snapshots").delete().in("id", old);
    }
  }catch(e){}
}

/* ---------------- Confetti (gentle, palette-matched) ---------------- */
const fx=document.getElementById("fx"); const fxc=fx.getContext("2d");
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; }
addEventListener("resize",sizeFx); sizeFx();
let parts=[];
function confetti(){
  const cols=["#3f7dff","#73b4ff","#ff8fc4","#ffffff"];
  for(let i=0;i<26;i++){
    parts.push({x:innerWidth/2+(Math.random()*80-40), y:innerHeight-120,
      vx:(Math.random()*6-3), vy:-(Math.random()*9+5), g:.28,
      s:Math.random()*5+3, c:cols[i%cols.length], a:1, r:Math.random()*6});
  }
  if(parts.length<=26) tickFx();
}
function tickFx(){
  fxc.clearRect(0,0,fx.width,fx.height);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.a-=.012; p.r+=.1;
    fxc.globalAlpha=Math.max(p.a,0); fxc.fillStyle=p.c;
    fxc.save(); fxc.translate(p.x,p.y); fxc.rotate(p.r); fxc.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); fxc.restore(); });
  parts=parts.filter(p=>p.a>0 && p.y<fx.height+30);
  if(parts.length) requestAnimationFrame(tickFx); else fxc.clearRect(0,0,fx.width,fx.height);
}

async function unlock(){

  if(!pw){ document.getElementById("lockmsg").textContent="Type the password."; return; }
  document.getElementById("lockmsg").textContent="Opening…";
  const ok=await initCloud(pw);
  if(!ok){ document.getElementById("lockmsg").textContent="That password doesn't match."; return; }
  document.getElementById("lock").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("addBtn").style.display="block";
  render();
}

document.getElementById("prev").onclick=()=>go(-1);
document.getElementById("next").onclick=()=>go(1);
document.getElementById("todayBtn").onclick=()=>{ cursor=stripTime(new Date()); selDay=ymd(new Date()); render(); };

document.getElementById("cancelAdd").onclick=closeSheet;
document.getElementById("pickGirl").onclick=()=>setWho("girl");
document.getElementById("pickBoy").onclick=()=>setWho("boy");

  closeSheet(); confetti();
};
